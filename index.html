<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash Runner - Enhanced</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(to bottom, #1a0033, #000022);
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
            border-radius: 5px;
            cursor: pointer;
        }
        .info {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
        }
        span { color: #00ffff; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="info">
        Press <span>SPACE</span>, <span>UP ARROW</span> or <span>CLICK</span> to jump.<br>
        Attempts: <span id="attemptCount">1</span> | Score: <span id="scoreDisplay">0</span>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const attemptCountDisplay = document.getElementById("attemptCount");
const scoreDisplay = document.getElementById("scoreDisplay");
let audioCtx = null;

function playTone(freq, type, duration) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e){}
}

let player = {
    x: 100,
    y: 300,
    size: 40,
    vy: 0,
    gravity: 1.6,
    jumpForce: -22,
    grounded: false,
    angle: 0
};

let obstacles = [];
let gameSpeed = 7;
let attempts = 1;
let score = 0;
let isGameOver = false;
let floorY = 340;
let scrollOffset = 0;

function spawnObstacle() {
    let minDistance = 280;
    let lastX = obstacles.length > 0 ? obstacles[obstacles.length - 1].x : canvas.width;
    if (lastX < canvas.width - minDistance && Math.random() < 0.05) {
        obstacles.push({
            x: canvas.width,
            width: 30,
            height: 40
        });
    }
}

function jump() {
    if (player.grounded && !isGameOver) {
        player.vy = player.jumpForce;
        player.grounded = false;
        playTone(300, 'square', 0.1);
    }
    if (isGameOver) {
        resetGame();
    }
}

window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); jump(); }
});
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
canvas.addEventListener("mousedown", jump);

function resetGame() {
    obstacles = [];
    player.y = floorY - player.size;
    player.vy = 0;
    player.angle = 0;
    gameSpeed = 7;
    score = 0;
    isGameOver = false;
    attempts++;
    attemptCountDisplay.innerText = attempts;
    playTone(150, 'sawtooth', 0.3);
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!isGameOver) {
        scrollOffset = (scrollOffset + gameSpeed) % 40;
    }

    // Scrolling road lines
    ctx.strokeStyle = "rgba(0, 255, 255, 0.1)";
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width + 40; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i - scrollOffset, 0);
        ctx.lineTo(i - scrollOffset, floorY);
        ctx.stroke();
    }

    // Floor
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(0, floorY, canvas.width, 4);

    // Background
    ctx.fillStyle = "#001133";
    ctx.fillRect(0, floorY + 4, canvas.width, canvas.height - floorY);

    if (!isGameOver) {
        // Player physics
        player.vy += player.gravity;
        player.y += player.vy;

        if (player.y >= floorY - player.size) {
            player.y = floorY - player.size;
            player.vy = 0;
            player.grounded = true;
            player.angle = Math.round(player.angle / 90) * 90;
        } else {
            player.angle += 4.5;
        }

        // Score & speed
        score++;
        scoreDisplay.innerText = score;

        if (score % 500 === 0) {
            gameSpeed += 0.8;
            playTone(450, 'sine', 0.1);
        }

        spawnObstacle();
    }

    // Draw player (rotated)
    ctx.save();
    ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
    ctx.rotate((player.angle * Math.PI) / 180);
    ctx.fillStyle = "#ff007f";
    ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.strokeRect(-player.size / 2, -player.size / 2, player.size, player.size);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(4, -12, 8, 8);
    ctx.fillRect(-12, -12, 8, 8);
    ctx.restore();

    // Draw obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        if (!isGameOver) obstacles[i].x -= gameSpeed;
        const obs = obstacles[i];
        ctx.fillStyle = "#00ffff";
        ctx.beginPath();
        ctx.moveTo(obs.x, floorY);
        ctx.lineTo(obs.x + obs.width / 2, floorY - obs.height);
        ctx.lineTo(obs.x + obs.width, floorY);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Precise collision (frame-accurate, no delay)
        const playerLeft = player.x + 5;
        const playerRight = player.x + player.size - 5;
        const playerBottom = player.y + player.size;
        const playerTop = player.y + 5;
        const obsLeft = obs.x;
        const obsRight = obs.x + obs.width;
        const obsTop = floorY - obs.height;

        if (playerRight > obsLeft && playerLeft < obsRight && playerBottom > obsTop && playerTop < floorY) {
            if (!isGameOver) {
                isGameOver = true;
                playTone(100, 'sawtooth', 0.5);
            }
        }

        if (obs.x + obs.width < 0) {
            obstacles.splice(i, 1);
        }
    }

    if (isGameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff007f";
        ctx.font = "bold 42px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.fillText("CRASH! TRY AGAIN", canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = "#fff";
        ctx.font = "20px 'Segoe UI'";
        ctx.fillText("Press any key or click to restart", canvas.width / 2, canvas.height / 2 + 30);
    }

    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
